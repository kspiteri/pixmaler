name: Deploy to GitHub Pages

# Builds the Vite frontend and publishes dist/ to GitHub Pages.
# The PartyKit/PartyServer realtime server is deployed separately to
# Cloudflare via `pnpm wr:deploy` — Pages is static-only and cannot host it.
#
# The client needs the deployed server's host at BUILD time, injected via the
# VITE_PARTYKIT_HOST repository variable (Settings → Secrets and variables →
# Actions → Variables). Set it to the bare host, e.g.
#   pixmaler.cold-hill-30d3.workers.dev
# (no protocol, no trailing slash).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_PARTYKIT_HOST: ${{ vars.VITE_PARTYKIT_HOST }}
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
