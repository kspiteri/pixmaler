<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixmaler</title>
    <!-- The 4-square pixel mark (shared with the wordmark in Logo.vue). SVG so it
         stays crisp at any size. Relative href resolves to <base>/mark.svg in both
         dev and the production build (a %BASE_URL% token double-applies the base in
         the dev server). -->
    <link rel="icon" type="image/svg+xml" href="./mark.svg" />
    <meta
      name="description"
      content="A real-time party game: redraw a pixelated image against the clock, then vote on the funniest results."
    />

    <!-- Open Graph / social preview. Absolute URLs — link-unfurl bots don't
         resolve relative paths, and they read these tags from the static HTML
         without executing the app JS (so they never open a game socket). Keeps
         Messenger/Facebook previews rich and stops polite crawlers at the head.
         og-image.png (public/) is the branded 1200×630 card, generated from the
         Logo design — see docs note in the commit history if it needs regenerating. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pixmaler" />
    <meta property="og:title" content="Pixmaler — pixel-art party game" />
    <meta
      property="og:description"
      content="Redraw a pixelated image against the clock, then vote on the funniest results. Grab a room code and play."
    />
    <meta property="og:url" content="https://kspiteri.github.io/pixmaler/" />
    <meta property="og:image" content="https://kspiteri.github.io/pixmaler/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pixmaler — pixel-art party game" />
    <meta
      name="twitter:description"
      content="Redraw a pixelated image against the clock, then vote on the funniest results."
    />
    <meta name="twitter:image" content="https://kspiteri.github.io/pixmaler/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // GitHub Pages SPA fallback. 404.html stashes the originally-requested
      // path in sessionStorage and redirects here; we restore it so the SPA
      // routing (e.g. /paint) sees the right URL.
      ;(function () {
        var saved = sessionStorage.getItem('pixmalerSpaRedirect')
        if (saved) {
          sessionStorage.removeItem('pixmalerSpaRedirect')
          history.replaceState(null, '', saved)
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
